<ul id="main-nav">
    {%- for item in site.data.nav -%}
    <li class="nav-item {% if page.url == item.link %}active{% endif %}">
        <a href="{{item.link | relative_url }}">{{item.name}}</a>
    </li>
    {%- endfor -%}
    <li class="nav-item" style="float: right;">
        <button id="adult-content-toggle" type="button" aria-pressed="false">18+</button>
    </li>
</ul>
